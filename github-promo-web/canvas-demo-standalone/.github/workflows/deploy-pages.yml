name: Deploy Demo To GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "canvas-demo-standalone/**"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: canvas-demo-standalone
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: canvas-demo-standalone/package-lock.json
      - run: npm install
      - run: DEMO_BASE=/${{ github.event.repository.name }}/ npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: canvas-demo-standalone/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
